<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Chat Assistant</title>
<script src="script.js" defer></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-xl font-bold mb-4">RAG Chat Assistant</h1>
    <div id="chat" class="h-64 overflow-y-auto border p-2 mb-4"></div>
    <input id="message" type="text" placeholder="Type your message..." class="w-full p-2 border rounded"/>
    <button id="send" class="mt-2 w-full bg-blue-500 text-white p-2 rounded">Send</button>
</div>
</body>
</html>
